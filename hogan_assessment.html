<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESAF – Assessment Hogan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — ESAF palette
   ═══════════════════════════════════════════════ */
:root {
  --brand:       #14343E;
  --brand-mid:   #0B7473;
  --accent:      #00A193;
  --accent-soft: rgba(0,161,147,0.10);

  --bg:          #D9E5E7;
  --bg2:         #ffffff;
  --bg3:         #EEF4F5;
  --surface:     #ffffff;
  --border:      #C2D2D5;
  --border2:     #9BB4B8;

  --text:        #0D2830;
  --text-sec:    #2B5260;
  --muted:       #4A6870;

  --success:     #1a7a42;
  --error:       #c8102e;
  --warn:        #c97d00;

  --shadow-sm:   0 1px 4px rgba(20,52,62,0.07);
  --shadow:      0 4px 16px rgba(20,52,62,0.09);
  --shadow-md:   0 6px 24px rgba(20,52,62,0.12);

  /* accents por módulo */
  --accent-hpi:  #00A193;
  --accent-hds:  #c8102e;
  --accent-mvpi: #0B7473;

  --font-display: 'Inter', sans-serif;
  --font-body:    'Inter', sans-serif;
  --radius:       8px;
  --radius-sm:    6px;
}

/* ── reset / base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── layout ── */
.shell { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }

/* ── ESAF header ── */
.esaf-header {
  background: var(--brand);
  position: sticky; top: 0; z-index: 100;
  padding: 0 32px; height: 64px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.esaf-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0; }
.esaf-logo img { height: 28px; width: auto; display: block; }
.esaf-logo-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.20); }
.esaf-logo-label { display: flex; flex-direction: column; gap: 1px; }
.esaf-logo-title { font-size: 12px; font-weight: 700; color: #fff; line-height: 1.2; letter-spacing: -0.01em; }
.esaf-logo-sub { font-size: 10px; color: rgba(255,255,255,0.50); font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }
.esaf-header-meta { flex: 1; text-align: center; font-size: 12px; color: rgba(255,255,255,0.55); }
.esaf-header-meta strong { color: rgba(255,255,255,0.90); }
.esaf-header-right { display: flex; gap: 6px; align-items: center; }
.esaf-icon-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.18); background: transparent;
  color: rgba(255,255,255,0.65); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; font-size: 14px;
}
.esaf-icon-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.35); }
.autofill-icon-btn { background: rgba(200,16,46,0.25) !important; border-color: rgba(200,16,46,0.50) !important; }
.autofill-icon-btn:hover { background: rgba(200,16,46,0.40) !important; }

/* ── progress bar (global) ── */
.global-progress {
  position: fixed; top: 64px; left: 0; right: 0; height: 3px;
  background: var(--border); z-index: 99;
}
.global-progress-fill {
  height: 100%; background: var(--accent);
  transition: width 0.4s ease, background 0.4s;
}

/* ── section header ── */
.section-intro { text-align: center; padding: 40px 0 44px; }
.section-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 13px; border-radius: 20px;
  border: 1px solid; font-size: 11px; font-weight: 600;
  letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 18px;
}
.badge-hpi  { color: var(--accent-hpi);  border-color: var(--accent-hpi);  background: var(--accent-soft); }
.badge-hds  { color: var(--accent-hds);  border-color: var(--accent-hds);  background: rgba(200,16,46,0.06); }
.badge-mvpi { color: var(--accent-mvpi); border-color: var(--accent-mvpi); background: rgba(11,116,115,0.08); }
.section-title {
  font-family: 'Inter', sans-serif; font-size: clamp(22px,4vw,32px);
  font-weight: 800; line-height: 1.2; margin-bottom: 10px;
  letter-spacing: -0.03em; color: var(--text);
}
.section-desc { color: var(--muted); max-width: 520px; margin: 0 auto 24px; font-size: 13px; }

/* ── module nav pills ── */
.module-nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.mod-pill {
  padding: 5px 16px; border-radius: 20px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); cursor: default; transition: all 0.2s;
}
.mod-pill.active-hpi  { color: var(--accent-hpi);  border-color: var(--accent-hpi);  background: var(--accent-soft); }
.mod-pill.active-hds  { color: var(--accent-hds);  border-color: var(--accent-hds);  background: rgba(200,16,46,0.06); }
.mod-pill.active-mvpi { color: var(--accent-mvpi); border-color: var(--accent-mvpi); background: rgba(11,116,115,0.08); }
.mod-pill.done { opacity: 0.5; }

/* ── progress within section ── */
.section-progress {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px; font-size: 12px; color: var(--muted);
}
.section-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.section-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.fill-hpi  { background: var(--accent-hpi); }
.fill-hds  { background: var(--accent-hds); }
.fill-mvpi { background: var(--accent-mvpi); }

/* ── scale group ── */
.scale-group { margin-bottom: 28px; }
.scale-header {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 2px solid var(--accent-soft);
}
.scale-name { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.scale-count { font-size: 11px; color: var(--muted); }

/* ── item card ── */
.item-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  margin-bottom: 8px; transition: border-color 0.2s, box-shadow 0.2s;
  position: relative; box-shadow: var(--shadow-sm);
}
.item-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.item-card.answered { border-left: 3px solid var(--accent); }
.item-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.item-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  font-size: 10px; color: var(--muted); flex-shrink: 0;
}
.item-text { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 14px; }

/* ── answer buttons ── */
.item-answers { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-vf {
  padding: 8px 20px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text-sec); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-vf:hover { border-color: var(--border2); color: var(--text); }
.btn-vf.sel-V  { background: var(--accent-soft); border-color: var(--accent-hpi); color: var(--accent-hpi); font-weight: 600; }
.btn-vf.sel-F  { background: var(--bg3); border-color: var(--border2); color: var(--text); font-weight: 600; }
.btn-vf.hds-sel-V { background: rgba(200,16,46,0.07); border-color: var(--accent-hds); color: var(--accent-hds); font-weight: 600; }
.item-card.answered.sel-V-card { border-left: 3px solid var(--accent-hpi); }
.likert-wrap { width: 100%; }
.likert-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.likert-btns { display: flex; gap: 6px; }
.btn-likert {
  flex: 1; padding: 10px 4px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text-sec); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.btn-likert:hover { border-color: var(--accent-mvpi); color: var(--text); }
.btn-likert.sel { background: rgba(11,116,115,0.10); border-color: var(--accent-mvpi); color: var(--accent-mvpi); font-weight: 600; }

/* ── navigation ── */
.nav-bar {
  position: sticky; bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 18px;
  margin-top: 24px; box-shadow: var(--shadow-md);
}
.nav-info { font-size: 12px; color: var(--muted); }
.nav-info strong { color: var(--text); }
.nav-btns { display: flex; gap: 8px; }
.btn-primary {
  padding: 9px 22px; border-radius: var(--radius-sm);
  border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-primary.hpi-btn  { background: var(--accent-hpi);  color: #fff; }
.btn-primary.hds-btn  { background: var(--brand);        color: #fff; }
.btn-primary.mvpi-btn { background: var(--brand-mid);    color: #fff; }
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-sec {
  padding: 9px 18px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-sec); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-sec:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.btn-sec:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── welcome screen ── */
.welcome { padding: 52px 0; text-align: center; }
.welcome-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.welcome-title {
  font-family: 'Inter', sans-serif; font-size: clamp(26px,5vw,40px);
  font-weight: 800; line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.04em; color: var(--text);
}
.welcome-title em { font-style: italic; color: var(--accent); }
.welcome-desc { color: var(--muted); max-width: 480px; margin: 0 auto 36px; line-height: 1.7; font-size: 13px; }
.modules-preview { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 32px; text-align: left; }
@media(max-width:560px) { .modules-preview { grid-template-columns: 1fr; } }
.mod-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm);
}
.mod-card-accent { width: 28px; height: 3px; border-radius: 2px; margin-bottom: 12px; }
.mod-card-title { font-size: 12px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
.mod-card-sub { font-size: 11px; color: var(--muted); }
.mod-card-count { font-size: 22px; font-weight: 800; font-family: 'Inter', sans-serif; margin-top: 12px; }
/* ── participant form ── */
.participant-form {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px 26px;
  max-width: 420px; margin: 0 auto 24px; text-align: left;
  box-shadow: var(--shadow-sm);
}
.participant-form-title {
  font-size: 12px; font-weight: 700; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
  letter-spacing: 0.03em; text-transform: uppercase;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.participant-field { margin-bottom: 12px; }
.participant-field:last-child { margin-bottom: 0; }
.participant-label {
  display: block; font-size: 10px; font-weight: 700;
  color: var(--muted); letter-spacing: 0.07em;
  text-transform: uppercase; margin-bottom: 5px;
}
.participant-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.participant-input:focus {
  border-color: var(--accent); background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.participant-input::placeholder { color: var(--muted); }
.participant-input.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(200,16,46,0.08); }
.result-participant {
  font-size: 14px; font-weight: 600; color: var(--text-sec); margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.result-participant-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  background: var(--accent-soft); border: 1px solid rgba(0,161,147,0.25);
  color: var(--accent-hpi); font-size: 11px; font-weight: 600;
}

.start-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.btn-start {
  padding: 11px 34px; border-radius: var(--radius-sm);
  background: var(--brand); color: #fff;
  border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.btn-start:hover { background: #1a4555; box-shadow: var(--shadow); transform: translateY(-1px); }
.time-note { font-size: 12px; color: var(--muted); }

/* ── RESULTADO ── */
.result-page { padding: 36px 0; }
.result-hero { text-align: center; margin-bottom: 44px; }
.result-hero-title {
  font-family: 'Inter', sans-serif; font-size: clamp(22px,4vw,34px);
  font-weight: 800; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.04em; color: var(--brand);
}
.result-hero-sub { color: var(--muted); font-size: 13px; }
.result-section { margin-bottom: 36px; }
.result-section-title {
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.result-section-title span { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.scale-result {
  display: grid; grid-template-columns: 180px 1fr 48px 80px;
  align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
}
@media(max-width:600px) {
  .scale-result { grid-template-columns: 1fr 60px; }
  .scale-result .sr-bar { grid-column: 1/-1; }
  .scale-result .sr-pct { grid-column: 2; grid-row: 1; }
}
.sr-name { font-size: 13px; font-weight: 600; color: var(--text); }
.sr-sub  { font-size: 11px; color: var(--muted); }
.sr-bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sr-bar-fill  { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.sr-score { font-size: 18px; font-family: 'Inter', sans-serif; font-weight: 700; text-align: right; }
.sr-label {
  font-size: 10px; padding: 3px 8px; border-radius: 10px;
  text-align: center; font-weight: 600; letter-spacing: 0.4px;
}
.lbl-alto   { background: var(--accent-soft);           color: var(--accent-hpi); border: 1px solid rgba(0,161,147,0.25); }
.lbl-medio  { background: rgba(201,125,0,0.09);         color: var(--warn);       border: 1px solid rgba(201,125,0,0.25); }
.lbl-baixo  { background: var(--bg3);                   color: var(--muted);      border: 1px solid var(--border); }
.lbl-risco  { background: rgba(200,16,46,0.07);         color: var(--error);      border: 1px solid rgba(200,16,46,0.20); }
.lbl-atencao{ background: rgba(201,125,0,0.09);         color: var(--warn);       border: 1px solid rgba(201,125,0,0.25); }
.lbl-ok     { background: rgba(26,122,66,0.07);         color: var(--success);    border: 1px solid rgba(26,122,66,0.20); }
.risk-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 8px; }
.risk-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; border-left: 3px solid; box-shadow: var(--shadow-sm);
}
.risk-card.high { border-left-color: var(--error); }
.risk-card.med  { border-left-color: var(--warn); }
.risk-card.low  { border-left-color: var(--border); }
.risk-card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.risk-card-cluster { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.risk-card-score { font-size: 24px; font-family: 'Inter', sans-serif; font-weight: 700; color: var(--text); }
.risk-card-max  { font-size: 12px; color: var(--muted); }
.risk-card-bar  { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.risk-card-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
.mvpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 8px; }
.mvpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm);
}
.mvpi-card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.mvpi-card-avg  { font-size: 26px; font-family: 'Inter', sans-serif; font-weight: 700; color: var(--brand-mid); margin: 8px 0 6px; }
.mvpi-card-bar  { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.mvpi-card-fill { height: 100%; background: var(--brand-mid); border-radius: 2px; transition: width 1s ease; }
.mvpi-card-label{ font-size: 11px; color: var(--muted); margin-top: 6px; }
.result-actions { display: flex; gap: 8px; justify-content: center; padding: 24px 0; flex-wrap: wrap; }
.btn-action {
  padding: 9px 22px; border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-restart { background: var(--surface); border: 1px solid var(--border); color: var(--text-sec); box-shadow: var(--shadow-sm); }
.btn-restart:hover { border-color: var(--border2); color: var(--text); box-shadow: var(--shadow); }
.btn-print { background: var(--brand); border: none; color: #fff; box-shadow: var(--shadow-sm); }
.btn-print:hover { background: #1a4555; box-shadow: var(--shadow); }

/* ── admin panel ── */
.admin-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,52,62,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 24px;
}
.admin-overlay.open { display: flex; }
.admin-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 760px; width: 100%;
  max-height: 85vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md);
}
.admin-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.admin-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.admin-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.admin-close:hover { background: var(--border); color: var(--text); }
.admin-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.admin-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.admin-tab {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.admin-tab.active { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.admin-section-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; color: var(--muted); margin-bottom: 10px; margin-top: 16px; }
.admin-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
  margin-bottom: 8px; outline: none; transition: border-color 0.15s;
}
.admin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.admin-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
  outline: none; cursor: pointer; transition: border-color 0.15s;
}
.admin-select:focus { border-color: var(--accent); }
.item-edit-row { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 6px; }
.item-edit-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.item-edit-num { font-size: 11px; color: var(--muted); min-width: 28px; }
.item-edit-scale { font-size: 11px; color: var(--muted); }
.item-edit-text { font-size: 13px; color: var(--text); flex: 1; }
.item-edit-scoring { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--border); color: var(--muted); flex-shrink: 0; }
.item-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-sm {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-sec);
}
.btn-sm:hover { border-color: var(--border2); color: var(--text); }
.btn-sm.danger { border-color: rgba(200,16,46,0.3); color: var(--error); }
.btn-sm.danger:hover { background: rgba(200,16,46,0.06); }
.btn-sm.primary { border-color: rgba(0,161,147,0.35); color: var(--accent); }
.btn-sm.primary:hover { background: var(--accent-soft); }
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.config-row { display: flex; flex-direction: column; gap: 4px; }
.config-label { font-size: 11px; color: var(--muted); font-weight: 600; }
.admin-save-bar { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.save-hint { font-size: 12px; color: var(--muted); }

/* ── inline edit overlay ── */
.edit-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,52,62,0.55); z-index: 300;
  align-items: center; justify-content: center; padding: 24px;
}
.edit-overlay.open { display: flex; }
.edit-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; max-width: 580px; width: 100%; box-shadow: var(--shadow-md);
}
.edit-box-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.edit-textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 13px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.6;
  min-height: 90px; resize: vertical; outline: none; margin-bottom: 13px; transition: border-color 0.15s;
}
.edit-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.edit-row { display: flex; gap: 10px; margin-bottom: 13px; align-items: center; flex-wrap: wrap; }
.edit-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ── history modal ── */
.history-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,52,62,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 24px;
}
.history-overlay.open { display: flex; }
.history-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 680px; width: 100%;
  max-height: 85vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md);
}
.history-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.history-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.history-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
.history-entry { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
.history-entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.history-entry-date { font-size: 13px; font-weight: 600; color: var(--text); }
.history-entry-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.history-entry-actions { display: flex; gap: 6px; flex-shrink: 0; }
.history-section-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; margin-top: 8px; font-weight: 700; }
.history-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.history-empty { text-align: center; padding: 44px 20px; color: var(--muted); }
.history-empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--brand); border: none;
  border-radius: var(--radius-sm); padding: 10px 18px;
  font-size: 13px; font-weight: 500; color: #fff; opacity: 0; transition: all 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 400; box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── animations ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-up   { animation: fadeUp 0.28s ease both; }
.fade-up-2 { animation: fadeUp 0.28s 0.06s ease both; }
.fade-up-3 { animation: fadeUp 0.28s 0.12s ease both; }

/* ── print ── */
@media print {
  .esaf-header, .nav-bar, .global-progress, .result-actions,
  .admin-overlay, .edit-overlay, .history-overlay, .toast { display: none !important; }
  @page { margin: 18mm 20mm; }
  body { background: #fff !important; }
  .shell { max-width: 100%; padding: 0; }
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

// ── máscara de telefone ──
function maskPhone(input) {
  // Remove tudo que não for dígito e limita a 11 dígitos
  const digits = input.value.replace(/\D/g, '').substring(0, 11);
  const len    = digits.length;
  let masked   = '';

  if (len === 0) {
    masked = '';
  } else if (len <= 2) {
    masked = '(' + digits;
  } else if (len <= 6) {
    masked = '(' + digits.substring(0, 2) + ') ' + digits.substring(2);
  } else if (len === 11) {
    // Celular: (XX) XXXXX-XXXX
    masked = '(' + digits.substring(0, 2) + ') ' + digits.substring(2, 7) + '-' + digits.substring(7);
  } else {
    // Fixo / incompleto: (XX) XXXX-XXXX
    masked = '(' + digits.substring(0, 2) + ') ' + digits.substring(2, 6) + '-' + digits.substring(6);
  }

  input.value = masked;
}

function applyPhoneMask(value) {
  const el = document.createElement('input');
  el.value = value || '';
  maskPhone(el);
  return el.value;
}

//  SCORING ENGINE
// ═══════════════════════════════════════════════════════════════════
function getWeight(module, itemId) {
  const key = `${module}_${itemId}`;
  return state.config[`weight_${key}`] || 1;
}

function calcHPI() {
  const scales = {};
  for (const item of state.items.hpi) {
    if (!scales[item.scale]) scales[item.scale] = { raw: 0, max: 0, count: 0 };
    const ans = state.answers.hpi[item.id];
    const w = getWeight('hpi', item.id);
    if (ans !== undefined) {
      let scored = ans === 'V' ? 1 : 0;
      if (item.scoring === 'R') scored = 1 - scored;
      scales[item.scale].raw += scored * w;
    }
    scales[item.scale].max += w;
    scales[item.scale].count++;
  }
  return scales;
}

function calcHDS() {
  const scales = {};
  for (const item of state.items.hds) {
    if (!scales[item.scale]) scales[item.scale] = { raw: 0, max: 0, cluster: item.cluster };
    const ans = state.answers.hds[item.id];
    const w = getWeight('hds', item.id);
    if (ans !== undefined) {
      scales[item.scale].raw += (ans === 'V' ? 1 : 0) * w;
    }
    scales[item.scale].max += w;
  }
  return scales;
}

function calcMVPI() {
  const scales = {};
  for (const item of state.items.mvpi) {
    if (!scales[item.scale]) scales[item.scale] = { sum: 0, count: 0 };
    const ans = state.answers.mvpi[item.id];
    if (ans !== undefined) scales[item.scale].sum += ans * getWeight('mvpi', item.id);
    scales[item.scale].count += getWeight('mvpi', item.id);
  }
  return scales;
}

function hpiLabel(pct, cfg) {
  if (pct >= cfg.thresholds.alto / 12) return { label: cfg.labels.alto, cls: 'lbl-alto' };
  if (pct >= cfg.thresholds.baixo / 12) return { label: cfg.labels.medio, cls: 'lbl-medio' };
  return { label: cfg.labels.baixo, cls: 'lbl-baixo' };
}
function hdsLabel(raw, max, cfg) {
  const pct = raw / max;
  if (pct >= cfg.thresholds.risco / 6) return { label: cfg.labels.risco, cls: 'lbl-risco' };
  if (pct >= cfg.thresholds.atencao / 6) return { label: cfg.labels.atencao, cls: 'lbl-atencao' };
  return { label: cfg.labels.ok, cls: 'lbl-ok' };
}
function mvpiLabel(avg, cfg) {
  if (avg >= cfg.thresholds.alto) return { label: cfg.labels.alto, cls: 'lbl-alto' };
  if (avg >= cfg.thresholds.baixo) return { label: cfg.labels.medio, cls: 'lbl-medio' };
  return { label: cfg.labels.baixo, cls: 'lbl-baixo' };
}

function countAnswered(module) {
  return Object.keys(state.answers[module]).length;
}
function totalItems(module) { return state.items[module].length; }

function renderModule(module) {
  const items = state.items[module];
  const answered = countAnswered(module);
  const total = items.length;
  const pct = Math.round(answered / total * 100);
  const accents = { hpi: 'hpi', hds: 'hds', mvpi: 'mvpi' };
  const badgeClass = `badge-${module}`;
  const fillClass = `fill-${module}`;
  const btnClass = `${module}-btn`;
  const modules = state.config.meta.modules;
  const modIdx = modules.indexOf(module);
  const nextMod = modules[modIdx + 1] || 'result';

  const titles = {
    hpi:  ['HPI · Lado Brilhante', 'Indique se cada afirmação é Verdadeira ou Falsa para você.'],
    hds:  ['HDS · Derailers', 'Seja honesto. Não há respostas certas ou erradas — o objetivo é autoconhecimento.'],
    mvpi: ['MVPI · Valores & Motivadores', 'Indique o quanto cada afirmação representa o que você valoriza no trabalho.'],
  };

  // group by scale
  const groups = {};
  for (const item of items) {
    if (!groups[item.scale]) groups[item.scale] = [];
    groups[item.scale].push(item);
  }

  const pillsHTML = modules.map(m => {
    const done = countAnswered(m) === totalItems(m);
    const active = m === module;
    const cls = active ? `mod-pill active-${m}` : `mod-pill${done ? ' done' : ''}`;
    const labels = { hpi:'HPI', hds:'HDS', mvpi:'MVPI' };
    return `<span class="${cls}">${labels[m]}${done && !active ? ' ✓' : ''}</span>`;
  }).join('');

  let groupsHTML = '';
  for (const [scale, scaleItems] of Object.entries(groups)) {
    groupsHTML += `
    <div class="scale-group">
      <div class="scale-header">
        <span class="scale-name" style="color:var(--accent-${module})">${scale}</span>
        <span class="scale-count">${scaleItems.length} afirmações</span>
      </div>
      ${scaleItems.map(item => renderItem(item, module)).join('')}
    </div>`;
  }

  updateHeader(`<strong>${answered}</strong>/${total} respondidas`);
  app.innerHTML = `
  <div class="section-intro fade-up">
    <div class="module-nav">${pillsHTML}</div>
    <div class="section-badge ${badgeClass}">${titles[module][0]}</div>
    <h2 class="section-title">${titles[module][0].split('·')[1].trim()}</h2>
    <p class="section-desc">${titles[module][1]}</p>
    <div class="section-progress">
      <span>${pct}% respondido</span>
      <div class="section-progress-bar"><div class="section-progress-fill ${fillClass}" style="width:${pct}%"></div></div>
      <span>${answered}/${total}</span>
    </div>
  </div>
  ${groupsHTML}
  <div class="nav-bar">
    <div class="nav-info">
      <strong>${total - answered}</strong> afirmações restantes neste módulo
    </div>
    <div class="nav-btns">
      ${modIdx > 0 ? `<button class="btn-sec" onclick="goModule('${modules[modIdx-1]}')">← Anterior</button>` : ''}
      <button class="btn-primary ${btnClass}" onclick="goModule('${nextMod}')" ${answered < total ? 'disabled' : ''}>
        ${nextMod === 'result' ? 'Ver resultado →' : `Próximo módulo →`}
      </button>
    </div>
  </div>`;
}

function renderItem(item, module) {
  const ans = state.answers[module][item.id];

  if (module === 'mvpi') {
    const btns = [1,2,3,4,5].map(v =>
      `<button class="btn-likert${ans === v ? ' sel' : ''}" onclick="answer('${module}',${item.id},${v})">${v}</button>`
    ).join('');
    return `
    <div class="item-card${ans !== undefined ? ' answered' : ''}" id="item-${module}-${item.id}">
      <div class="item-meta">
        <span class="item-num">${item.id}</span>
        <span>${item.subscale}</span>
      </div>
      <div class="item-text">${item.text}</div>
      <div class="likert-wrap">
        <div class="likert-labels"><span>Discordo totalmente</span><span>Concordo totalmente</span></div>
        <div class="likert-btns">${btns}</div>
      </div>
    </div>`;
  } else {
    return `
    <div class="item-card${ans !== undefined ? ' answered' : ''}${ans === 'V' ? ' sel-V-card' : ''}" id="item-${module}-${item.id}">
      <div class="item-meta">
        <span class="item-num">${item.id}</span>
        <span>${item.subscale}</span>
      </div>
      <div class="item-text">${item.text}</div>
      <div class="item-answers">
        <button class="btn-vf${ans === 'V' ? ' ' + (module==='hds'?'hds-sel-V':'sel-V') : ''}" onclick="answer('${module}',${item.id},'V')">Verdadeiro</button>
        <button class="btn-vf${ans === 'F' ? ' sel-F' : ''}" onclick="answer('${module}',${item.id},'F')">Falso</button>
      </div>
    </div>`;
  }
}

// ─── RESULT ──────────────────────────────────────────────────────
function renderResult() {
  const hpiScales  = calcHPI();
  const hdsScales  = calcHDS();
  const mvpiScales = calcMVPI();
  const hpiCfg  = state.config.hpi;
  const hdsCfg  = state.config.hds;
  const mvpiCfg = state.config.mvpi;

  // HPI rows
  let hpiHTML = '';
  for (const [scale, data] of Object.entries(hpiScales)) {
    const pct = data.max > 0 ? data.raw / data.max : 0;
    const lbl = hpiLabel(pct, hpiCfg);
    const score = Math.round(data.raw * 10) / 10;
    const desc = SCALE_DESCRIPTIONS.hpi[scale] || '';
    hpiHTML += `
    <div class="scale-result">
      <div><div class="sr-name">${scale}</div><div class="sr-sub">${desc}</div></div>
      <div class="sr-bar sr-bar-track"><div class="sr-bar-fill fill-hpi" style="width:0%" data-pct="${Math.round(pct*100)}"></div></div>
      <div class="sr-score" style="color:var(--accent-hpi)">${score}</div>
      <div><span class="sr-label ${lbl.cls}">${lbl.label}</span></div>
    </div>`;
  }

  // HDS cards
  let hdsHTML = '<div class="risk-cards">';
  const hdsEntries = Object.entries(hdsScales).sort((a,b) => (b[1].raw/b[1].max) - (a[1].raw/a[1].max));
  for (const [scale, data] of hdsEntries) {
    const pct = data.max > 0 ? data.raw / data.max : 0;
    const lbl = hdsLabel(data.raw, data.max, hdsCfg);
    const lvl = lbl.cls === 'lbl-risco' ? 'high' : lbl.cls === 'lbl-atencao' ? 'med' : 'low';
    const score = Math.round(data.raw * 10) / 10;
    const fillColor = lvl === 'high' ? 'var(--accent-hds)' : lvl === 'med' ? 'var(--accent-hpi)' : 'var(--muted)';
    hdsHTML += `
    <div class="risk-card ${lvl}">
      <div class="risk-card-name">${scale}</div>
      <div class="risk-card-cluster">${data.cluster}</div>
      <span class="sr-label ${lbl.cls}" style="display:inline-block;margin-bottom:8px">${lbl.label}</span>
      <div><span class="risk-card-score">${score}</span><span class="risk-card-max"> / ${data.max.toFixed(0)}</span></div>
      <div class="risk-card-bar"><div class="risk-card-fill" data-pct="${Math.round(pct*100)}" style="background:${fillColor};width:0%"></div></div>
    </div>`;
  }
  hdsHTML += '</div>';

  // MVPI cards
  let mvpiHTML = '<div class="mvpi-grid">';
  const mvpiEntries = Object.entries(mvpiScales).sort((a,b) => (b[1].sum/b[1].count) - (a[1].sum/a[1].count));
  for (const [scale, data] of mvpiEntries) {
    const avg = data.count > 0 ? data.sum / data.count : 0;
    const pct = (avg - 1) / 4;
    const lbl = mvpiLabel(avg, mvpiCfg);
    const desc = SCALE_DESCRIPTIONS.mvpi[scale] || '';
    mvpiHTML += `
    <div class="mvpi-card">
      <div class="mvpi-card-name">${scale}</div>
      <div class="mvpi-card-avg">${avg.toFixed(1)}</div>
      <div class="mvpi-card-bar"><div class="mvpi-card-fill" data-pct="${Math.round(pct*100)}" style="width:0%"></div></div>
      <div class="mvpi-card-label">${desc} · <span class="sr-label ${lbl.cls}" style="display:inline">${lbl.label}</span></div>
    </div>`;
  }
  mvpiHTML += '</div>';

  updateHeader('Resultado');
  app.innerHTML = `
  <div class="result-page fade-up">
    <div class="result-hero">
      <h1 class="result-hero-title">Perfil de Personalidade</h1>
      ${state.participant.nome ? `
      <div class="result-participant">
        <span class="result-participant-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${state.participant.nome}
        </span>
        ${state.participant.telefone ? `<span class="result-participant-badge" style="background:rgba(11,116,115,0.10);border-color:rgba(11,116,115,0.25);color:var(--brand-mid)">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.1 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
          ${state.participant.telefone}
        </span>` : ''}
      </div>` : ''}
      <p class="result-hero-sub" style="margin-top:8px">Gerado em ${new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}</p>
    </div>

    <div class="result-section">
      <div class="result-section-title"><span style="background:var(--accent-hpi)"></span> HPI — Lado Brilhante</div>
      ${hpiHTML}
    </div>

    <div class="result-section">
      <div class="result-section-title"><span style="background:var(--accent-hds)"></span> HDS — Derailers sob Pressão</div>
      ${hdsHTML}
    </div>

    <div class="result-section">
      <div class="result-section-title"><span style="background:var(--accent-mvpi)"></span> MVPI — Valores & Motivadores</div>
      ${mvpiHTML}
    </div>

    <div class="result-actions">
      <button class="btn-action btn-restart" onclick="startOver()">↩ Refazer</button>
      <button class="btn-action btn-restart" onclick="showHistory()">📋 Histórico</button>
      <button class="btn-action btn-restart" onclick="exportResultJSON()">⬇ Baixar JSON</button>
      <button class="btn-action btn-print" onclick="window.print()">🖨 Salvar PDF</button>
    </div>
  </div>`;

  // animate bars after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('[data-pct]').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);
  });
}

//  ACTIONS
// ═══════════════════════════════════════════════════════════════════
function collectParticipant() {
  const nomeEl = document.getElementById('participantNome');
  const telEl  = document.getElementById('participantTel');
  if (!nomeEl) return true; // not on welcome screen, skip
  const nome = nomeEl.value.trim();
  if (!nome) {
    nomeEl.classList.add('error');
    nomeEl.focus();
    showToast('Informe seu nome para continuar');
    nomeEl.addEventListener('input', () => nomeEl.classList.remove('error'), { once: true });
    return false;
  }
  state.participant = {
    nome,
    telefone: telEl ? telEl.value.trim() : '',
  };
  saveParticipant();
  return true;
}

function startAssessment() {
  if (!collectParticipant()) return;
  state.answers = { hpi:{}, hds:{}, mvpi:{} };
  clearSavedAnswers();
  const first = state.config.meta.modules[0];
  state.screen = first;
  render();
  window.scrollTo(0,0);
}

function goModule(mod) {
  if (mod === 'result' && state.screen !== 'result') saveToHistory();
  state.screen = mod;
  render();
  window.scrollTo(0,0);
}

function answer(module, id, value) {
  state.answers[module][id] = value;
  saveAnswers();
  // update just this card UI
  const card = document.getElementById(`item-${module}-${id}`);
  if (!card) { render(); return; }
  if (module === 'mvpi') {
    card.querySelectorAll('.btn-likert').forEach((b,i) => {
      b.classList.toggle('sel', i+1 === value);
    });
  } else {
    const [bV, bF] = card.querySelectorAll('.btn-vf');
    bV.className = `btn-vf${value === 'V' ? ' ' + (module==='hds'?'hds-sel-V':'sel-V') : ''}`;
    bF.className = `btn-vf${value === 'F' ? ' sel-F' : ''}`;
    if (value === 'V') card.classList.add('sel-V-card'); else card.classList.remove('sel-V-card');
  }
  card.classList.add('answered');
  // update counts
  const answered = countAnswered(module);
  const total = totalItems(module);
  const meta = document.querySelector('.topbar-meta');
  if (meta) meta.textContent = `${answered}/${total} respondidas`;
  const pct = Math.round(answered/total*100);
  const bar = document.querySelector('.section-progress-fill');
  if (bar) bar.style.width = pct+'%';
  const pctSpans = document.querySelectorAll('.section-progress span');
  if (pctSpans[0]) pctSpans[0].textContent = pct+'% respondido';
  if (pctSpans[1]) pctSpans[1].textContent = `${answered}/${total}`;
  // enable/disable next btn
  const nextBtn = document.querySelector('.nav-bar .btn-primary');
  if (nextBtn) nextBtn.disabled = answered < total;
  // update global bar
  updateGlobalProgress();
}

function startOver() {
  state.answers = { hpi:{}, hds:{}, mvpi:{} };
  clearSavedAnswers();
  state.screen = 'welcome';
  render();
  window.scrollTo(0,0);
}

function openEdit(module, id) {
  const item = state.items[module].find(i => i.id === id);
  if (!item) return;
  state.editTarget = { module, id };
  document.getElementById('editMeta').textContent = `${module.toUpperCase()} · ${item.scale} · ${item.subscale}`;
  document.getElementById('editText').value = item.text;
  if (module !== 'mvpi') {
    document.getElementById('editScoring').value = item.scoring || 'N';
    document.getElementById('editScoring').style.display = '';
  } else {
    document.getElementById('editScoring').style.display = 'none';
  }
  const wKey = `weight_${module}_${id}`;
  document.getElementById('editWeight').value = state.config[wKey] || 1;
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  state.editTarget = null;
}
function saveEdit() {
  const { module, id } = state.editTarget;
  const item = state.items[module].find(i => i.id === id);
  item.text = document.getElementById('editText').value.trim();
  if (module !== 'mvpi') item.scoring = document.getElementById('editScoring').value;
  const w = parseFloat(document.getElementById('editWeight').value);
  if (!isNaN(w) && w > 0) state.config[`weight_${module}_${id}`] = w;
  saveState();
  closeEdit();
  render();
  showToast('Afirmação atualizada');
}

// ═══════════════════════════════════════════════════════════════════
//  AUTO-FILL (MODO TESTE)
// ═══════════════════════════════════════════════════════════════════
function autoFillAll() {
  const vf = ['V', 'F'];
  for (const item of state.items.hpi) {
    if (state.answers.hpi[item.id] === undefined)
      state.answers.hpi[item.id] = vf[Math.random() < 0.5 ? 0 : 1];
  }
  for (const item of state.items.hds) {
    if (state.answers.hds[item.id] === undefined)
      state.answers.hds[item.id] = vf[Math.random() < 0.5 ? 0 : 1];
  }
  for (const item of state.items.mvpi) {
    if (state.answers.mvpi[item.id] === undefined)
      state.answers.mvpi[item.id] = Math.floor(Math.random() * 5) + 1;
  }
  saveAnswers();
  render();
  showToast('Todas as respostas preenchidas aleatoriamente');
}

// ═══════════════════════════════════════════════════════════════════
//  CONTINUAR ASSESSMENT
// ═══════════════════════════════════════════════════════════════════
function continueAssessment() {
  if (!collectParticipant()) return;
  const modules = state.config.meta.modules;
  for (const mod of modules) {
    if (countAnswered(mod) < totalItems(mod)) {
      state.screen = mod;
      render();
      window.scrollTo(0,0);
      return;
    }
  }
  saveToHistory();
  state.screen = 'result';
  render();
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════════════
function buildScoreSummary() {
  const hpiScales  = calcHPI();
  const hdsScales  = calcHDS();
  const mvpiScales = calcMVPI();
  const hpiCfg  = state.config.hpi;
  const hdsCfg  = state.config.hds;
  const mvpiCfg = state.config.mvpi;

  const hpi = Object.entries(hpiScales).map(([scale, d]) => {
    const pct = d.max > 0 ? d.raw / d.max : 0;
    const lbl = hpiLabel(pct, hpiCfg);
    return { scale, raw: Math.round(d.raw*10)/10, max: Math.round(d.max*10)/10, pct: Math.round(pct*100), label: lbl.label, cls: lbl.cls };
  });
  const hds = Object.entries(hdsScales).map(([scale, d]) => {
    const pct = d.max > 0 ? d.raw / d.max : 0;
    const lbl = hdsLabel(d.raw, d.max, hdsCfg);
    return { scale, raw: Math.round(d.raw*10)/10, max: Math.round(d.max*10)/10, pct: Math.round(pct*100), label: lbl.label, cls: lbl.cls, cluster: d.cluster };
  }).sort((a,b) => b.pct - a.pct);
  const mvpi = Object.entries(mvpiScales).map(([scale, d]) => {
    const avg = d.count > 0 ? d.sum / d.count : 0;
    const lbl = mvpiLabel(avg, mvpiCfg);
    return { scale, avg: Math.round(avg*100)/100, pct: Math.round((avg-1)/4*100), label: lbl.label, cls: lbl.cls };
  }).sort((a,b) => b.avg - a.avg);

  return { hpi, hds, mvpi };
}

function saveToHistory() {
  try {
    const total = Object.values(state.answers).reduce((s,a) => s + Object.keys(a).length, 0);
    if (!total) return;

    const history = loadHistory();
    const now = new Date();
    const scores = buildScoreSummary();
    const entry = {
      id: now.getTime().toString(),
      timestamp: now.toISOString(),
      dateFormatted: now.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' }) +
                     ' · ' + now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }),
      participant: { ...state.participant },
      answers: JSON.parse(JSON.stringify(state.answers)),
      scores,
      totalAnswered: {
        hpi: countAnswered('hpi'),
        hds: countAnswered('hds'),
        mvpi: countAnswered('mvpi'),
      }
    };
    history.unshift(entry);
    localStorage.setItem('hogan_history', JSON.stringify(history.slice(0, 30)));

    sendResultToWebhook(entry);
  } catch(e) {}
}

async function sendResultToWebhook(entry) {
  const url = (state.config.meta.webhookUrl || '').trim();
  if (!url) return;

  const payload = {
    timestamp:    entry.timestamp,
    assessment:   state.config.meta.title,
    participant:  entry.participant,
    totalAnswered: entry.totalAnswered,
    scores:       entry.scores,
    answers:      entry.answers,
  };

  // Indicador visual no header
  updateHeader('<span style="color:rgba(255,255,255,0.55);font-size:11px">⏳ Enviando resultado...</span>');

  try {
    const res = await fetch(url, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    if (res.ok) {
      showToast('✓ Resultado enviado ao banco de dados');
    } else {
      showToast('Aviso: servidor retornou ' + res.status, true);
      console.warn('[Hogan webhook] HTTP', res.status, url);
    }
  } catch (err) {
    showToast('Erro ao enviar resultado: ' + err.message, true);
    console.error('[Hogan webhook]', err);
  } finally {
    // Restaura header para "Resultado"
    updateHeader('Resultado');
  }
}

function loadHistory() {
  try { const s = localStorage.getItem('hogan_history'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
}

function deleteHistoryEntry(id) {
  const h = loadHistory().filter(e => e.id !== id);
  localStorage.setItem('hogan_history', JSON.stringify(h));
  renderHistoryModal();
  showToast('Entrada removida');
}

function viewHistoryEntry(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry) return;
  // Guarda respostas atuais e substitui temporariamente
  state._savedAnswers = JSON.parse(JSON.stringify(state.answers));
  state.answers = entry.answers;
  closeHistory();
  state.screen = 'result';
  render();
  window.scrollTo(0,0);
}

// ── HISTORY MODAL ──────────────────────────────────────────────────
function showHistory() {
  renderHistoryModal();
  document.getElementById('historyOverlay').classList.add('open');
}
function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
  // Restaura respostas atuais se estava vendo histórico
  if (state._savedAnswers) {
    state.answers = state._savedAnswers;
    delete state._savedAnswers;
  }
}

function renderHistoryModal() {
  const history = loadHistory();
  const container = document.getElementById('historyList');
  if (!history.length) {
    container.innerHTML = `
    <div class="history-empty">
      <div class="history-empty-icon">📋</div>
      <p>Nenhum resultado salvo ainda.</p>
      <p style="font-size:12px;margin-top:6px;color:var(--muted)">Complete o assessment para salvar automaticamente.</p>
    </div>`;
    return;
  }
  container.innerHTML = history.map(entry => {
    const totalAns = (entry.totalAnswered.hpi||0) + (entry.totalAnswered.hds||0) + (entry.totalAnswered.mvpi||0);
    const topHPI  = (entry.scores.hpi||[]).slice(0,3).map(s =>
      `<span class="sr-label ${s.cls}" style="display:inline">${s.scale}: ${s.label}</span>`).join('');
    const alertHDS = (entry.scores.hds||[]).filter(s => s.cls !== 'lbl-ok').slice(0,3).map(s =>
      `<span class="sr-label ${s.cls}" style="display:inline">${s.scale}</span>`).join('');
    const topMVPI = (entry.scores.mvpi||[]).slice(0,3).map(s =>
      `<span class="sr-label lbl-alto" style="display:inline">${s.scale}: ${s.avg}</span>`).join('');
    return `
    <div class="history-entry">
      <div class="history-entry-top">
        <div>
          <div class="history-entry-date">${entry.participant && entry.participant.nome ? entry.participant.nome : entry.dateFormatted}</div>
          <div class="history-entry-meta">${entry.participant && entry.participant.nome ? entry.dateFormatted + ' · ' : ''}${totalAns} respostas${entry.participant && entry.participant.telefone ? ' · ' + entry.participant.telefone : ''}</div>
        </div>
        <div class="history-entry-actions">
          <button class="btn-sm" onclick="viewHistoryEntry('${entry.id}')">Ver resultado</button>
          <button class="btn-sm primary" onclick="exportHistoryJSON('${entry.id}')">⬇ JSON</button>
          <button class="btn-sm danger" onclick="deleteHistoryEntry('${entry.id}')">✕</button>
        </div>
      </div>
      ${topHPI  ? `<div class="history-section-lbl">HPI — Lado Brilhante</div><div class="history-tags">${topHPI}</div>` : ''}
      ${alertHDS ? `<div class="history-section-lbl">HDS — Derailers em atenção</div><div class="history-tags">${alertHDS}</div>` : ''}
      ${topMVPI ? `<div class="history-section-lbl">MVPI — Top valores</div><div class="history-tags">${topMVPI}</div>` : ''}
    </div>`;
  }).join('');
}

document.getElementById('historyOverlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeHistory();
});

// ═══════════════════════════════════════════════════════════════════
//  EXPORTAÇÃO
// ═══════════════════════════════════════════════════════════════════
function exportResultJSON() {
  const scores = buildScoreSummary();
  const data = {
    exportDate: new Date().toISOString(),
    assessment: state.config.meta.title,
    participant: { ...state.participant },
    totalAnswered: {
      hpi: countAnswered('hpi'),
      hds: countAnswered('hds'),
      mvpi: countAnswered('mvpi'),
    },
    scores,
    answers: state.answers,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hogan_resultado_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('JSON baixado com sucesso');
}

function exportHistoryJSON(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry) return;
  const data = {
    exportDate: new Date().toISOString(),
    assessmentDate: entry.timestamp,
    assessment: state.config.meta.title,
    totalAnswered: entry.totalAnswered,
    scores: entry.scores,
    answers: entry.answers,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hogan_${entry.id}.json`;
  a.click();
  showToast('JSON baixado');
}

// ── init ──
render();
</script>
